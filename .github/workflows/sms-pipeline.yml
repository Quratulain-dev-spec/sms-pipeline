name: Sms Pipeline Workflow

on:
    workflow_dispatch:
    push:
        branches:
            - main
            - 'feature/*'


jobs:
    Install:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                app: [frontend, backend]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: setup node
              uses: actions/setup-node@v6
              with:
                node-version: 20

            - name: Install dependency
              run: |
                cd ${{ matrix.app}}
                npm install
            
    test-and-audit:
        runs-on: ubuntu-latest
        needs: Install

        strategy:
            matrix:
                app: [frontend, backend]

        steps:
            - name: checkout repository
              uses: actions/checkout@v6
              
            - name: setup node
              uses: actions/setup-node@v6
              with:
                node-version: 20

            - name: Install Dependency
              run: |
                cd ${{ matrix.app }}
                npm install

            - name: Run Tests
              run: |
                echo 'running test for ${{ matrix.app }}'

            - name: Security audit
              run: |
                cd ${{ matrix.app }}
                npm audit --audit-level=critical

            - name: Cache node modules
              uses: actions/cache@v5
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}


    Build-images:
        runs-on: ubuntu-latest
        needs: test-and-audit

        strategy:
            matrix:
                app: [frontend, backend]
        steps:
            - name: checkout 
              uses: actions/checkout@v6

            - name: docker login
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build images
              uses: docker/build-push-action@v7
              with:
                  context: ./${{ matrix.app }}
                  file: ./${{ matrix.app }}/Dockerfile
                  push: true
                  tags: ${{ secrets.DOCKERHUB_USERNAME}}/github-sms-${{ matrix.app }}:${{ github.run_number }}

    Trivy-scan:
      runs-on: ubuntu-latest
      needs: Build-images
      strategy:
        matrix:
          app: [frontend, backend]

      steps:
        - name: docker login
          uses: docker/login-action@v4
          with:
              username: ${{ secrets.DOCKERHUB_USERNAME }}
              password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Scan Trivy
          uses: aquasecurity/trivy-action@v0.20.0
          with:
            image-ref: ${{ secrets.DOCKER_USER }}/github-sms-${{ matrix.app }}:${{ github.run_number }}
            format: json
            severity: CRITICAL
            exit-code: 1
            output: trivy-${{ matrix.app }}.json
 
        

          











             




